<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>바로청소 · 청소요청</title>
<style>
  :root{ --g:#2E9E6B; --gd:#1f7d52; --gl:#e8f6ef; --b:#2F6FB3;
         --tx:#1b2b24; --mut:#71817a; --line:#e2e7e4; --pg:#eef1f3; }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body{ font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; background:var(--pg); color:var(--tx); }
  .wrap{ max-width:460px; margin:0 auto; min-height:100vh; background:#fff; }
  .hd{ background:var(--g); color:#fff; padding:18px 18px 20px; }
  .hd .brand{ display:flex; align-items:center; gap:9px; font-size:21px; font-weight:800; letter-spacing:.5px; }
  .hd .tag{ font-size:13px; opacity:.93; margin-top:4px; }
  .ico{ width:22px; height:22px; fill:currentColor; }
  .bd{ padding:18px 18px 30px; }
  .lab{ font-size:13.5px; font-weight:bold; margin:18px 0 8px; }
  .lab:first-child{ margin-top:2px; }
  .lab .opt{ color:#a9b4af; font-weight:normal; font-size:12px; }
  .chips{ display:flex; gap:8px; flex-wrap:wrap; }
  .chip{ font-size:13.5px; padding:10px 14px; border-radius:22px; border:1.5px solid var(--line);
         color:var(--mut); background:#fff; cursor:pointer; user-select:none; }
  .chip.on{ background:var(--gl); border-color:var(--g); color:var(--gd); font-weight:bold; }
  .photo{ display:block; border:1.8px dashed #b9cabf; border-radius:12px; background:#f6faf8; padding:20px; text-align:center; color:var(--g); cursor:pointer; }
  .photo svg{ width:30px; height:30px; fill:var(--g); }
  .photo .t{ font-size:14px; font-weight:bold; margin-top:6px; }
  .photo .s{ font-size:12px; color:var(--mut); margin-top:3px; }
  .thumbs{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .thumbs img{ width:70px; height:70px; object-fit:cover; border-radius:8px; border:1px solid var(--line); }
  .loc{ display:flex; align-items:center; gap:8px; background:var(--gl); border:1px solid #bfe3d1; border-radius:10px; padding:11px 13px; font-size:13px; color:var(--gd); font-weight:bold; }
  .loc.err{ background:#fdeee3; border-color:#f0c9a8; color:#b4671a; }
  .loc svg{ width:17px; height:17px; fill:currentColor; flex:none; }
  .inp{ width:100%; border:1.5px solid var(--line); border-radius:10px; padding:12px 13px; font-size:14px; color:var(--tx); background:#fff; font-family:inherit; }
  .inp:focus{ outline:none; border-color:var(--g); }
  textarea.inp{ height:64px; resize:vertical; }
  .agree{ display:flex; align-items:center; gap:9px; margin-top:18px; font-size:13px; cursor:pointer; user-select:none; }
  .cbx{ width:20px; height:20px; border-radius:6px; border:1.6px solid #b9cabf; background:#fff; display:flex; align-items:center; justify-content:center; flex:none; }
  .cbx svg{ width:13px; height:13px; fill:#fff; display:none; }
  .agree.on .cbx{ background:var(--g); border-color:var(--g); }
  .agree.on .cbx svg{ display:block; }
  .agree a{ color:var(--b); }
  .btn{ width:100%; background:var(--g); color:#fff; font-size:16px; font-weight:bold; border:0; border-radius:12px; padding:15px; margin-top:20px; letter-spacing:1px; cursor:pointer; }
  .btn:disabled{ opacity:.55; }
  .foot{ text-align:center; font-size:11px; color:#a9b4af; padding:16px 0 24px; }
  /* done */
  .done{ display:none; padding:44px 24px 40px; text-align:center; }
  .badge{ width:76px; height:76px; border-radius:50%; background:var(--gl); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
  .badge svg{ width:38px; height:38px; fill:var(--g); }
  .done h2{ font-size:20px; }
  .done p{ font-size:14px; color:var(--mut); margin-top:10px; line-height:1.65; }
  .rcpt{ background:#f4f7f5; border:1px dashed #c3d0c9; border-radius:10px; padding:14px; margin:20px 0 4px; }
  .rcpt .k{ font-size:12px; color:var(--mut); }
  .rcpt .v{ font-size:19px; font-weight:800; color:var(--gd); letter-spacing:1px; margin-top:3px; }
  .obtn{ width:100%; background:#fff; color:var(--gd); font-size:14px; font-weight:bold; border:1.6px solid var(--g); border-radius:12px; padding:13px; margin-top:20px; cursor:pointer; }
  .toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%); background:#222; color:#fff; font-size:13px; padding:11px 18px; border-radius:24px; opacity:0; transition:.25s; z-index:9; }
  .toast.on{ opacity:.94; }
  .spin{ display:inline-block; width:16px; height:16px; border:2.5px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:sp .7s linear infinite; vertical-align:-3px; margin-right:6px; }
  @keyframes sp{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="brand"><svg class="ico" viewBox="0 0 24 24"><path d="M12 3l3 5h-2v4h-2V8H9l3-5zm7.5 8l1.8 3.1-2.6 1.5-1-1.7-1.7 1 1-4.4 4.5.5zM4.5 11l4.5-.5 1 4.4-1.7-1-1 1.7-2.6-1.5L4.5 11zM8 18h8l-1.5 2.6H9.5L8 18z"/></svg>바로청소</div>
    <div class="tag">깨끗한 우리 동네, 바로 요청하세요</div>
  </div>

  <!-- 요청 폼 -->
  <div class="bd" id="form">
    <div class="lab">요청 유형</div>
    <div class="chips" id="chips"></div>

    <div class="lab">사진 첨부 <span class="opt">(최대 3장)</span></div>
    <label class="photo" for="photo">
      <svg viewBox="0 0 24 24"><path d="M9 3l-1.5 2H4a2 2 0 00-2 2v11a2 2 0 002 2h16a2 2 0 002-2V7a2 2 0 00-2-2h-3.5L15 3H9zm3 5.5A4.5 4.5 0 1112 17a4.5 4.5 0 010-9z"/></svg>
      <div class="t">사진 촬영 · 첨부</div>
      <div class="s">현장이 잘 보이게 찍어주세요</div>
    </label>
    <input id="photo" type="file" accept="image/*" capture="environment" multiple style="display:none"/>
    <div class="thumbs" id="thumbs"></div>

    <div class="lab">위치</div>
    <div class="loc" id="loc"><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 00-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 00-7-7zm0 9.5A2.5 2.5 0 1112 6a2.5 2.5 0 010 5.5z"/></svg><span id="locTxt">현재 위치를 확인하는 중…</span></div>
    <input class="inp" id="addr" placeholder="상세 주소 (예: ○○로 12번길 앞)" style="margin-top:9px"/>

    <div class="lab">상세 내용 <span class="opt">(선택)</span></div>
    <textarea class="inp" id="detail" placeholder="어떤 상황인지 적어주세요"></textarea>

    <div class="lab">연락처 <span class="opt">(선택 · 처리결과 회신용)</span></div>
    <input class="inp" id="phone" type="tel" placeholder="010-0000-0000"/>

    <div class="agree" id="agree"><span class="cbx"><svg viewBox="0 0 24 24"><path d="M9 16.2l-4-4L3.6 13.6 9 19 20.4 7.6 19 6.2z"/></svg></span>
      <span>개인정보 수집·이용에 동의합니다 <a href="#" id="ppLink">(자세히)</a></span></div>

    <button class="btn" id="submit">요청 보내기</button>
    <div class="foot">㈜세얼환경 · 바로청소　|　수거·청소 요청 창구입니다</div>
  </div>

  <!-- 접수 완료 -->
  <div class="done" id="done">
    <div class="badge"><svg viewBox="0 0 24 24"><path d="M9 16.2l-4-4L3.6 13.6 9 19 20.4 7.6 19 6.2z"/></svg></div>
    <h2>요청이 접수되었습니다</h2>
    <p>기동반이 확인 후 <b>당일 처리</b>를 원칙으로 대응합니다.<br/>연락처를 남기시면 처리 결과를 알려드립니다.</p>
    <div class="rcpt"><div class="k">접수번호</div><div class="v" id="rno">–</div></div>
    <button class="obtn" onclick="location.reload()">새 요청하기</button>
    <div class="foot">㈜세얼환경 · 바로청소</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { firebaseConfig, CATEGORIES } from './firebase-config.js';
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, addDoc, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const $ = s => document.querySelector(s);
const toast = m => { const t=$('#toast'); t.textContent=m; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2200); };

// 유형 칩
let category = CATEGORIES[0];
const chipsEl = $('#chips');
CATEGORIES.forEach((c,i)=>{ const el=document.createElement('span'); el.className='chip'+(i===0?' on':''); el.textContent=c;
  el.onclick=()=>{ category=c; [...chipsEl.children].forEach(x=>x.classList.remove('on')); el.classList.add('on'); }; chipsEl.appendChild(el); });

// 동의
let agreed=false;
$('#agree').onclick=()=>{ agreed=!agreed; $('#agree').classList.toggle('on',agreed); };
$('#ppLink').onclick=e=>{ e.preventDefault(); e.stopPropagation();
  alert('[개인정보 수집·이용 안내]\n\n· 수집 항목 : 위치정보, 사진, (선택)연락처\n· 이용 목적 : 청소요청 처리 및 결과 회신\n· 보관 기간 : 처리 완료 후 1년, 이후 파기\n· 동의 거부 시 요청 접수가 제한될 수 있습니다.'); };

// 위치
let lat=null,lng=null;
if(navigator.geolocation){ navigator.geolocation.getCurrentPosition(
  p=>{ lat=+p.coords.latitude.toFixed(6); lng=+p.coords.longitude.toFixed(6);
       $('#locTxt').textContent=`현재 위치 확인됨 (${lat}, ${lng})`; },
  ()=>{ $('#loc').classList.add('err'); $('#locTxt').textContent='위치 확인 불가 — 상세 주소를 입력해 주세요'; },
  { enableHighAccuracy:true, timeout:8000 }); }
else { $('#loc').classList.add('err'); $('#locTxt').textContent='이 기기는 위치를 지원하지 않습니다'; }

// 사진 (최대 3장, 브라우저에서 압축하여 Firestore에 저장 — Storage 불필요)
let files=[];   // 각 항목: base64 dataURL 문자열
$('#photo').onchange=async e=>{
  for(const f of e.target.files){ if(files.length>=3){ toast('사진은 최대 3장까지'); break; } files.push(await compress(f)); }
  renderThumbs(); e.target.value='';
};
function renderThumbs(){ const t=$('#thumbs'); t.innerHTML=''; files.forEach((durl,i)=>{ const img=document.createElement('img');
  img.src=durl; img.onclick=()=>{ files.splice(i,1); renderThumbs(); }; t.appendChild(img); }); }
function compress(file){ return new Promise(res=>{ const img=new Image(); img.onload=()=>{ let max=1200,q=0.6,durl='';
  for(let i=0;i<7;i++){ let {width:w,height:h}=img; if(w>max||h>max){ const r=Math.min(max/w,max/h); w=w*r|0; h=h*r|0; }
    const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
    durl=c.toDataURL('image/jpeg',q); if(durl.length<700000) break; if(q>0.4) q-=0.1; else max=Math.round(max*0.82); }
  res(durl); }; img.src=URL.createObjectURL(file); }); }

// 접수번호
function receiptNo(){ const d=new Date(), p=n=>String(n).padStart(2,'0');
  return `BC-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`; }

// 제출
$('#submit').onclick=async ()=>{
  if(!agreed){ toast('개인정보 수집·이용에 동의해 주세요'); return; }
  if(!files.length && !$('#addr').value.trim() && lat===null){ toast('사진 또는 위치·주소를 입력해 주세요'); return; }
  const btn=$('#submit'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>접수 중…';
  try{
    const rno=receiptNo();
    const r=await addDoc(collection(db,'requests'),{
      receiptNo:rno, category, lat, lng, address:$('#addr').value.trim(),
      detail:$('#detail').value.trim(), phone:$('#phone').value.trim(),
      photoCount:files.length, status:'received', cityReferred:false,
      createdAt:serverTimestamp()
    });
    for(let i=0;i<files.length;i++){ await setDoc(doc(db,'requests',r.id,'media',String(i)),{ image:files[i], idx:i }); }
    // 텔레그램 알림 (서버에 봇 설정 시 발송 · 실패해도 접수엔 영향 없음)
    try{ fetch('/api/notify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({receiptNo:rno,category,address:$('#addr').value.trim(),lat,lng,photoCount:files.length})}); }catch(e){}
    $('#form').style.display='none'; $('#rno').textContent=rno; $('#done').style.display='block';
    window.scrollTo(0,0);
  }catch(err){ console.error(err); toast('전송 실패 — 잠시 후 다시 시도해 주세요'); btn.disabled=false; btn.textContent='요청 보내기'; }
};
</script>
</body>
</html>
